<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>德阳农交所 · 项目资源库</title>
<style>
:root{--blue:#1a5276;--blue2:#2e86c1;--blue3:#3498db;--gold:#d4a017;--green:#27ae60;--orange:#e67e22;--bg:#f0f2f5;--card:#fff;--text:#333;--text2:#666;--tag:#eaf2f8;--shadow:0 2px 8px rgba(0,0,0,.06);--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:0 0 80px;min-height:100vh}
/* Header */
.hd{background:linear-gradient(135deg,#154360,#1a5276,#2471a3,#2e86c1);color:#fff;padding:30px 20px 25px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(26,82,118,.3)}
.hd h1{font-size:22px;margin-bottom:6px;letter-spacing:1px}
.hd p{font-size:13px;opacity:.85}
/* Stats */
.st{display:flex;justify-content:center;gap:12px;padding:15px;flex-wrap:wrap}
.st .sc{background:#fff;border-radius:var(--radius);padding:14px 20px;text-align:center;box-shadow:var(--shadow);min-width:90px;flex:1;max-width:120px;cursor:pointer;transition:all .2s}
.st .sc:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.st .sc b{font-size:26px;color:var(--blue);display:block;line-height:1.2}
.st .sc span{font-size:11px;color:#888;display:block;margin-top:4px}
.st .sc.active{background:var(--blue);color:#fff}
.st .sc.active b,.st .sc.active span{color:#fff}
/* Filters */
.fl{background:#fff;margin:0 15px 16px;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.fl-row{display:flex;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.fl-row:last-child{margin-bottom:0}
.fl-label{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;min-width:44px}
.fl-tags{display:flex;flex-wrap:wrap;gap:6px}
.fl-tag{padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#666;transition:all .2s;white-space:nowrap;user-select:none}
.fl-tag:hover{border-color:var(--blue3);color:var(--blue3)}
.fl-tag.active{background:var(--blue);border-color:var(--blue);color:#fff}
.fl-search{flex:1;min-width:150px;padding:8px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:13px;outline:none;transition:border .2s}
.fl-search:focus{border-color:var(--blue3)}
.fl-reset{padding:6px 16px;border-radius:16px;font-size:12px;cursor:pointer;border:1.5px solid var(--orange);color:var(--orange);background:#fff;white-space:nowrap;transition:all .2s}
.fl-reset:hover{background:var(--orange);color:#fff}
/* Counter */
.counter{text-align:center;font-size:13px;color:#888;padding:4px 0 8px}
.counter b{color:var(--blue);font-size:15px}
/* Project List */
.pl{padding:0 15px}
/* Card */
.card{background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;transition:all .2s;border-left:4px solid var(--blue2)}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.card.district0{border-left-color:#3498db}
.card.district1{border-left-color:#e67e22}
.card.district2{border-left-color:#9b59b6}
.card.district3{border-left-color:#27ae60}
.card.district4{border-left-color:#e74c3c}
.card.district5{border-left-color:#1abc9c}
.card-main{padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.card-arrow{font-size:14px;color:#bbb;margin-top:2px;transition:transform .3s;min-width:16px}
.card.expanded .card-arrow{transform:rotate(90deg)}
.card-body{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:700;color:var(--blue);margin-bottom:6px;line-height:1.4}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.card-tag{display:inline-flex;align-items:center;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.card-tag.dist{background:#eaf2f8;color:#1a5276}
.card-tag.type{background:#fef5e7;color:#b9770e}
.card-info{font-size:12px;color:#888;line-height:1.6}
.card-detail{display:none;padding:0 16px 14px 42px;font-size:13px;color:#555;line-height:1.7;border-top:1px solid #f0f0f0;margin-top:4px}
.card.expanded .card-detail{display:block}
.card-detail b{color:var(--blue)}
/* Pagination */
.pg{display:flex;justify-content:center;align-items:center;gap:6px;padding:20px 0;flex-wrap:wrap}
.pg button{min-width:36px;height:36px;border-radius:18px;border:1.5px solid #ddd;background:#fff;color:#666;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;padding:0 8px}
.pg button:hover:not(:disabled){border-color:var(--blue3);color:var(--blue3)}
.pg button.active{background:var(--blue);border-color:var(--blue);color:#fff}
.pg button:disabled{opacity:.4;cursor:default}
.pg .pg-info{font-size:12px;color:#888;padding:0 8px}
/* Footer */
.ft{text-align:center;padding:25px 15px;color:#fff;background:var(--blue);border-radius:var(--radius);margin:16px 15px;font-size:13px;line-height:2.2}
.ft .ft-name{font-size:16px;font-weight:700}
.ft .ft-note{opacity:.7;font-size:11px}
/* Mobile tweaks */
@media(max-width:400px){
.hd{padding:22px 14px 18px}
.hd h1{font-size:18px}
.st{gap:6px;padding:10px}
.st .sc{padding:10px 6px;max-width:80px}
.st .sc b{font-size:20px}
.card-main{padding:12px}
.card-name{font-size:14px}
.fl{padding:10px;margin:0 10px 12px}
.pl{padding:0 10px}
.ft{margin:12px 10px}
}
/* Loading */
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:#888}
.loading::before{content:'';display:block;width:30px;height:30px;border:3px solid #ddd;border-top-color:var(--blue3);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
/* Empty state */
.empty{text-align:center;padding:40px;color:#aaa}
.empty .empty-icon{font-size:40px;margin-bottom:8px}
/* Back to top */
.btt{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:22px;background:var(--blue);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);display:none;z-index:99;transition:opacity .3s}
.btt.show{display:flex;align-items:center;justify-content:center}
</style>
</head>

// ---------- STATE ----------
const PAGE_SIZE = 20;
let currentPage = 1;
let districtFilter = '';
let typeFilter = '';
let searchText = '';
let expandedCards = new Set();

// ---------- COMPUTED ----------
const districts = [...new Set(DATA.map(p => p.district))].sort();
const types = [...new Set(DATA.map(p => p.type))].sort();

function getFiltered() {
  return DATA.filter(p => {
    if (districtFilter && p.district !== districtFilter) return false;
    if (typeFilter && p.type !== typeFilter) return false;
    if (searchText) {
      const s = searchText.toLowerCase();
      if (!p.name.toLowerCase().includes(s) &&
          !p.location.toLowerCase().includes(s) &&
          !p.detail.toLowerCase().includes(s) &&
          !p.type.toLowerCase().includes(s)) return false;
    }
    return true;
  });
}

// ---------- RENDER ----------
function renderStats() {
  const filtered = getFiltered();
  const fdists = {};
  filtered.forEach(p => { fdists[p.district] = (fdists[p.district]||0)+1; });
  
  let html = `<div class="sc${!districtFilter?' active':''}" onclick="filterDistrict('')">
    <b>${filtered.length}</b><span>筛选结果</span></div>`;
  districts.forEach(d => {
    const n = fdists[d] || 0;
    html += `<div class="sc${districtFilter===d?' active':''}" onclick="filterDistrict('${d.replace(/'/g,"\\'")}')">
      <b>${n}</b><span>${d}</span></div>`;
  });
  document.getElementById('stats').innerHTML = html;
}

function renderDistrictTags() {
  let html = `<span class="fl-tag${!districtFilter?' active':''}" onclick="filterDistrict('')">全部</span>`;
  districts.forEach(d => {
    html += `<span class="fl-tag${districtFilter===d?' active':''}" onclick="filterDistrict('${d.replace(/'/g,"\\'")}')">${d}</span>`;
  });
  document.getElementById('districtTags').innerHTML = html;
}

function renderTypeTags() {
  const filtered = getFiltered();
  const ftypes = {};
  filtered.forEach(p => { ftypes[p.type] = (ftypes[p.type]||0)+1; });
  
  let html = `<span class="fl-tag${!typeFilter?' active':''}" onclick="filterType('')">全部</span>`;
  types.forEach(t => {
    if (ftypes[t]) {
      html += `<span class="fl-tag${typeFilter===t?' active':''}" onclick="filterType('${t.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">${t}<small>(${ftypes[t]})</small></span>`;
    }
  });
  document.getElementById('typeTags').innerHTML = html;
}

function renderCounter() {
  const filtered = getFiltered();
  const total = filtered.length;
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, total);
  document.getElementById('counter').innerHTML = total > 0
    ? `显示 <b>${start}-${end}</b> / 共 <b>${total}</b> 个项目`
    : '未找到匹配项目';
}

function renderList() {
  const filtered = getFiltered();
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  
  if (page.length === 0) {
    document.getElementById('list').innerHTML = `<div class="empty"><div class="empty-icon">📭</div>暂无匹配项目，试试调整筛选条件</div>`;
    return;
  }
  
  const di = districts.indexOf(districtFilter);
  
  let html = '';
  page.forEach((p, i) => {
    const pid = (start + i);
    const expanded = expandedCards.has(pid);
    const dclass = districtFilter ? ` district${di}` : '';
    html += `<div class="card${dclass}${expanded?' expanded':''}" id="card-${pid}">
      <div class="card-main" onclick="toggleCard(${pid})">
        <span class="card-arrow">▶</span>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-meta">
            <span class="card-tag dist">📍 ${p.district}</span>
            <span class="card-tag type">📂 ${p.type}</span>
            ${p.code ? `<span class="card-tag" style="background:#e8f8f5;color:#148f77">🔢 ${p.code}</span>` : ''}
          </div>
          <div class="card-info">
            📐 ${p.area || '-'} · 📅 ${p.period || '面议'} · 🏠 ${p.location || '-'}
          </div>
        </div>
      </div>
      <div class="card-detail">
        ${p.detail ? `<b>📝 详细情况：</b><br>${p.detail}` : '暂无详细描述'}
        ${p.location ? `<br><br><b>📍 项目所在地：</b>${p.location}` : ''}
      </div>
    </div>`;
  });
  document.getElementById('list').innerHTML = html;
}

function renderPagination() {
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  
  let html = `<button onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>◀</button>`;
  
  const range = 3;
  let startP = Math.max(1, currentPage - range);
  let endP = Math.min(totalPages, currentPage + range);
  if (currentPage <= range) endP = Math.min(totalPages, range*2+1);
  if (currentPage >= totalPages - range) startP = Math.max(1, totalPages - range*2);
  
  if (startP > 1) html += `<button onclick="changePage(1)">1</button>${startP>2?'<span class="pg-info">…</span>':''}`;
  for (let i = startP; i <= endP; i++) {
    html += `<button class="${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
  }
  if (endP < totalPages) html += `${endP<totalPages-1?'<span class="pg-info">…</span>':''}<button onclick="changePage(${totalPages})">${totalPages}</button>`;
  
  html += `<button onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>▶</button>`;
  html += `<span class="pg-info">共${totalPages}页</span>`;
  document.getElementById('pagination').innerHTML = html;
}

// ---------- ACTIONS ----------
function toggleCard(pid) {
  if (expandedCards.has(pid)) expandedCards.delete(pid);
  else expandedCards.add(pid);
  renderList();
}

function filterDistrict(d) {
  districtFilter = d;
  currentPage = 1;
  doFilter();
}

function filterType(t) {
  typeFilter = t;
  currentPage = 1;
  doFilter();
}

function doFilter() {
  searchText = document.getElementById('search').value.trim();
  currentPage = 1;
  renderAll();
}

function changePage(p) {
  const total = Math.ceil(getFiltered().length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderAll();
  window.scrollTo({top: document.getElementById('list').offsetTop - 100, behavior: 'smooth'});
}

function resetAll() {
  districtFilter = '';
  typeFilter = '';
  searchText = '';
  document.getElementById('search').value = '';
  currentPage = 1;
  renderAll();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderAll() {
  renderStats();
  renderDistrictTags();
  renderTypeTags();
  renderCounter();
  renderList();
  renderPagination();
}

// ---------- SCROLL TO TOP BUTTON ----------
window.addEventListener('scroll', () => {
  document.getElementById('btt').classList.toggle('show', window.scrollY > 400);
});

// ---------- INIT ----------
renderAll();
</script>
</body>
</html>
